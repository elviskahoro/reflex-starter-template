[build]
builder = "dockerfile"
watchPatterns = [
  "Dockerfile",
  "pyproject.toml",
  "uv.lock",
  "web/**",
  "Caddyfile",
  "entrypoint.sh",
]

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

# Graceful shutdown: give old deploy 30s to close connections before force kill
drainingSeconds = 30

# Health check settings
healthcheckPath = "/ping"
healthcheckTimeout = 10
healthcheckInterval = 5

[env]
REFLEX_ENV = "prod"
PYTHONUNBUFFERED = "1"
PORT = "8080"
